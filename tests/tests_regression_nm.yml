---
# set network provider and gather facts
- name: Run playbook 'playbooks/tests_checkpoint_cleanup.yml' with nm as
    provider
  hosts: all
  tasks:
    - name: Include the task 'el_repo_setup.yml'
      include_tasks: tasks/el_repo_setup.yml

    - name: Set network provider to 'nm'
      set_fact:
        network_provider: nm
    - name: Install NetworkManager
      package:
        name: NetworkManager
        state: present
        use: "{{ (__network_is_ostree | d(false)) |
                 ternary('ansible.posix.rhel_rpm_ostree', omit) }}"
    - name: Get package info
      package_facts:
    - name: Get NetworkManager version
      set_fact:
        networkmanager_version: "{{
          ansible_facts.packages['NetworkManager'][0]['version'] }}"
    - name: Include distro variables
      include_vars: vars/rh_distros_vars.yml
    - name: Set platform facts
      set_fact:
        __network_distro_major_version: "{{ ansible_facts['distribution_major_version'] }}"
        __network_is_rhel: "{{ ansible_facts['distribution'] == 'RedHat' }}"
        __network_is_fedora: "{{ ansible_facts['distribution'] == 'Fedora' }}"
        __network_is_centos: "{{ ansible_facts['distribution'] == 'CentOS' }}"
        __network_is_os_family_rhel: "{{ ansible_facts['os_family'] == 'RedHat' }}"

# workaround for: https://github.com/ansible/ansible/issues/27973
# There is no way in Ansible to abort a playbook hosts with specific OS
# releases Therefore we include the playbook with the tests only if the hosts
# would support it.
# The test requires NetworkManager, therefore it cannot run on RHEL/CentOS 6
- name: Import the playbook 'playbooks/tests_checkpoint_cleanup.yml'
  import_playbook: playbooks/tests_checkpoint_cleanup.yml
  when:
    - __network_distro_major_version != '6'
    # The test depends on behavior that is only visible with newer NM
    - networkmanager_version is version('1.22.0', '>=')
    - not __network_is_os_family_rhel or
      (__network_is_fedora and
       __network_distro_major_version | int < 41) or
      __network_distro_major_version | int < 9
