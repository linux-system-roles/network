---
- name: Play for setting up snapshots
  hosts: all
  tasks:
    - name: Set facts used by role
      include_tasks: tasks/run_role_with_clear_facts.yml
      vars:
        __sr_tasks_from: set_facts.yml
        __sr_public: true

    - name: Install test packages
      package:
        name: "{{ network_packages }}"
        state: present
