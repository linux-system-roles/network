---
- name: Clean up the test devices and the connection profiles
  tags:
    - "tests::cleanup"
  block:
    - name: Import network role
      include_tasks: run_role_with_clear_facts.yml
      vars:
        network_connections:
          - name: "{{ profile }}"
            persistent_state: absent
            state: down
          - name: "{{ vlan_profile1 }}"
            persistent_state: absent
            state: down
          - name: "{{ vlan_profile2 }}"
            persistent_state: absent
            state: down
        __sr_failed_when: false
    - name: Delete the device '{{ interface }}'
      command: ip link del {{ interface }}
      failed_when: false
      changed_when: false
...
