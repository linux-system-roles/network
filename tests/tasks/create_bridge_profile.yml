---
- name: Include network role
  include_tasks: run_role_with_clear_facts.yml
  vars:
    network_connections:
      - name: "{{ interface }}"
        persistent_state: present
        type: bridge
        ip:
          dhcp4: false
          auto6: false
- name: Show result
  debug:
    var: __network_connections_result
...
