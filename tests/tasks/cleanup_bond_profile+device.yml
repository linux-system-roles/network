---
- name: Clean up the test devices and the connection profiles
  tags:
    - "tests::cleanup"
  block:
    - name: Import network role
      include_tasks: run_role_with_clear_facts.yml
      vars:
        network_connections:
          - name: "{{ port2_profile }}"
            persistent_state: absent
            state: down
          - name: "{{ port1_profile }}"
            persistent_state: absent
            state: down
          - name: "{{ controller_profile }}"
            persistent_state: absent
            state: down
        __sr_failed_when: false
    - name: Delete the device '{{ controller_device }}'
      command: ip link del {{ controller_device }}
      failed_when: false
      changed_when: false
...
